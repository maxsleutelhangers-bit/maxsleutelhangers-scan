<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Scan</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  .header { background: #1a1a2e; padding: 1rem; text-align: center; font-size: 1rem; font-weight: 600; letter-spacing: 0.5px; }
  #reader { width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #reader video { width: 100% !important; height: 100% !important; object-fit: cover; }
  #reader img { display: none !important; }
  .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .overlay-content { text-align: center; padding: 2rem; }
  .overlay-content .check { font-size: 4rem; color: #4ade80; margin-bottom: 1rem; }
  .overlay-content .code { font-size: 1.2rem; font-family: monospace; color: #999; margin-bottom: 0.5rem; }
  .overlay-content .product-name { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.3rem; color: #fff; }
  .overlay-content .product-price { font-size: 1.2rem; color: #4ade80; }
  .status { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: rgba(26,26,46,0.9); padding: 0.5rem 1.2rem; border-radius: 20px; font-size: 0.8rem; color: #999; white-space: nowrap; }
</style>
</head>
<body>
  <div class="header" id="headerText">Richt camera op een barcode</div>
  <div id="reader"></div>
  <div class="status" id="status">Camera starten...</div>

  <div class="overlay" id="overlay">
    <div class="overlay-content">
      <div class="check">✓</div>
      <div class="code" id="overlayCode"></div>
      <div class="product-name" id="overlayName"></div>
      <div class="product-price" id="overlayPrice"></div>
    </div>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const sessionCode = params.get('s');
  const vercelUrl = window.location.origin;

  if (sessionCode) {
    document.getElementById('headerText').textContent = `Sessie: ${sessionCode}`;
  }

  const statusEl = document.getElementById('status');
  const overlay = document.getElementById('overlay');
  let lastScan = 0;

  function showOverlay(barcode) {
    document.getElementById('overlayCode').textContent = barcode;
    document.getElementById('overlayName').textContent = '';
    document.getElementById('overlayPrice').textContent = '';
    overlay.classList.add('show');
    navigator.vibrate && navigator.vibrate(100);
    setTimeout(() => overlay.classList.remove('show'), 1500);
  }

  async function onScanSuccess(decodedText) {
    const now = Date.now();
    if (now - lastScan < 2000) return;
    lastScan = now;

    statusEl.textContent = `✅ ${decodedText}`;
    showOverlay(decodedText);

    if (sessionCode) {
      await fetch(`${vercelUrl}/api/scan`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ barcode: decodedText, session: sessionCode })
      });
    }
  }

  const html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
    onScanSuccess
  ).then(() => {
    statusEl.textContent = 'Camera actief';
  }).catch(err => {
    statusEl.textContent = 'Camera fout: ' + err;
  });
</script>
</body>
</html>
